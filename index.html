<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<title>Simulador Hipotecario PRO</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>Simulador Hipotecario</h1>

<h3>Datos vivienda</h3>

<label>Precio vivienda (€)</label>
<input type="number" id="precio">

<label>Entrada disponible (€)</label>
<input type="number" id="entrada">

<h3>Hipoteca</h3>

<label>Euríbor (%)</label>
<input type="number" id="euribor" readonly>

<label>Diferencial banco (%)</label>
<input type="number" id="diferencial" value="1">

<label>Años hipoteca</label>
<input type="number" id="años">

<label>Ingresos anuales (€)</label>
<input type="number" id="ingresos">

<h3>Gastos compra</h3>

<label>ITP / IVA (%)</label>
<input type="number" id="impuesto" value="10">

<label>Notaría (€)</label>
<input type="number" id="notaria" value="1000">

<label>Registro (€)</label>
<input type="number" id="registro" value="500">

<label>Tasación (€)</label>
<input type="number" id="tasacion" value="400">

<label>Gestoría (€)</label>
<input type="number" id="gestoria" value="300">

<h3>Amortización anticipada</h3>

<label>Mes amortización</label>
<input type="number" id="mesAmortizacion">

<label>Capital amortizado (€)</label>
<input type="number" id="capitalAmortizado">

<button onclick="calcular()">Calcular hipoteca</button>

<button onclick="toggleAmortizacion()">Ver cuadro amortización</button>

<div id="resultado"></div>

<h3>Reparto pagos</h3>
<canvas id="grafico1"></canvas>

<h3>Evolución deuda</h3>
<canvas id="grafico2"></canvas>

<label>Filtrar año</label>

<select id="filtroAno" onchange="filtrarTabla()">

<option value="0">Todos</option>

</select>

<table id="tabla" style="display:none">

<thead>

<tr>

<th>Mes</th>
<th>Cuota</th>
<th>Interés</th>
<th>Capital</th>
<th>Deuda</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

<script src="script.js"></script>

</body>
</html>
