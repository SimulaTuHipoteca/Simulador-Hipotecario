<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Hipotecario</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Simulador Hipotecario</h1>

  <!-- --- BOTONES SECCIÓN --- -->
  <div class="grid">
    <button id="btnCalculadora">Calculadora</button>
    <button id="btnPerfil">Analizar Perfil</button>
  </div>

  <!-- --- CALCULADORA --- -->
  <div id="calculadora">
    <h2>Calculadora de Hipoteca</h2>
    <div class="grid">
      <label>Importe préstamo (€)</label>
      <input id="prestamo" type="number" placeholder="Ej: 100000">
      <label>Interés anual (%)</label>
      <input id="interes" type="number" placeholder="Ej: 2.5">
      <label>Plazo (años)</label>
      <input id="anos" type="number" placeholder="Ej: 20">
    </div>
    <div class="cards" id="resultados" style="display:none;">
      <div class="card">Cuota mensual: <span id="cuota"></span></div>
      <div class="card">Intereses totales: <span id="interesesTotales"></span></div>
      <div class="card">Total pagado: <span id="totalPagado"></span></div>
    </div>
    <button id="verTabla" style="display:none;">Ver tabla de amortización</button>
    <div id="tablaContainer">
      <table id="tabla">
        <thead>
          <tr>
            <th>Mes</th>
            <th>Cuota</th>
            <th>Intereses</th>
            <th>Capital</th>
            <th>Saldo</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- --- PERFIL --- -->
  <div id="perfil" style="display:none;">
    <h2>Analizar Perfil</h2>
    <div class="grid">
      <label>Nº de titulares</label>
      <select id="perfilTitulares">
        <option value="1">1 titular</option>
        <option value="2">2 titulares</option>
      </select>
      <label>Pagas anuales</label>
      <input id="perfilPagas" type="number" value="12">
      <label>Otros ingresos (€)</label>
      <input id="perfilOtroIngreso" type="number" placeholder="Ej: 5000">
      <label>Ahorros (€)</label>
      <input id="perfilAhorros" type="number" placeholder="Ej: 20000">
      <label>Deudas (€)</label>
      <input id="perfilDeuda" type="number" placeholder="Ej: 5000">
    </div>

    <!-- TITULAR 1 -->
    <h3>Titular 1</h3>
    <div class="grid">
      <label>Edad</label>
      <input id="perfilEdad1" type="number" placeholder="Ej: 35">
      <label>Salario anual (€)</label>
      <input id="perfilSalario1" type="number" placeholder="Ej: 30000">
    </div>

    <!-- TITULAR 2 -->
    <div id="titular2Div" style="display:none;">
      <h3>Titular 2</h3>
      <div class="grid">
        <label>Edad</label>
        <input id="perfilEdad2" type="number" placeholder="Ej: 32">
        <label>Salario anual (€)</label>
        <input id="perfilSalario2" type="number" placeholder="Ej: 25000">
      </div>
    </div>

    <!-- VIVIENDA -->
    <div>
      <label><input type="checkbox" id="yaTieneVivienda"> Tiene vivienda</label>
      <div id="viviendaInfo" style="display:none;">
        <div class="grid">
          <label>Precio vivienda (€)</label>
          <input id="perfilPrecio" type="number" placeholder="Ej: 100000">
          <label>Tipo vivienda</label>
          <select id="perfilTipoVivienda">
            <option value="primera">Primera vivienda</option>
            <option value="segunda">Segunda residencia</option>
            <option value="local">Local</option>
          </select>
          <label>Comunidad autónoma</label>
          <select id="perfilComunidad">
            <option value="andalucia">Andalucía</option>
            <option value="madrid">Madrid</option>
            <option value="catalunya">Cataluña</option>
            <!-- agregar más según necesidad -->
          </select>
        </div>
      </div>
    </div>

    <!-- RESULTADOS PERFIL -->
    <div class="cards">
      <div class="card">Capital posible: <span id="perfilCapital"></span></div>
      <div class="card">Cuota mensual: <span id="perfilCuota"></span></div>
      <div class="card">LTV: <span id="perfilLTV"></span></div>
      <div class="card">Gastos: <span id="perfilGastos"></span></div>
      <div class="card">LTI: <span id="perfilLTI"></span></div>
      <div class="card">Compatibilidad: <span id="perfilCompatible"></span></div>
    </div>
    <div style="color:red; font-weight:bold;" id="perfilAviso"></div>
  </div>
</div>
<!-- EURIBOR referencia -->
<div class="euriborInfo">Tipo interés referencia 2.8%</div>

<script src="script.js"></script>
</body>
</html>
