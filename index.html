<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simula tu Hipoteca</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h1>Simula tu Hipoteca</h1>

<!-- BOTONES -->
<div class="selector">
  <button id="btnCalculadora">Calculadora de Hipoteca</button>
  <button id="btnPerfil">Analizar Perfil</button>
</div>

<p class="euriborInfo">
Euríbor actual (referencia hipotecas): <span id="euriborValor">cargando...</span>
</p>

<!-- CALCULADORA -->
<div id="calculadora" class="seccion">
<h2>Calculadora de Hipoteca</h2>
<div class="grid">
  <div>
    <label>Importe del préstamo (€)</label>
    <input id="prestamo" type="number" value="200000">
  </div>
  <div>
    <label>Tipo de interés anual (%)</label>
    <input id="interes" type="number" step="0.01" value="3">
  </div>
  <div>
    <label>Plazo (años)</label>
    <input id="anos" type="number" value="30">
  </div>
</div>

<div class="cards" id="resultados">
  <div class="card"><p>Cuota mensual</p><h3 id="cuota"></h3></div>
  <div class="card"><p>Intereses totales</p><h3 id="interesesTotales"></h3></div>
  <div class="card"><p>Total pagado</p><h3 id="totalPagado"></h3></div>
</div>

<button id="verTabla">Ver tabla de amortización</button>
<div id="tablaContainer">
<h2>Tabla de amortización</h2>
<table id="tabla">
<thead>
<tr><th>Mes</th><th>Cuota</th><th>Interés</th><th>Capital</th><th>Restante</th></tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<!-- PERFIL FINANCIERO -->
<div id="perfil" class="seccion" style="display:none;">
<h2>Analizar Perfil Financiero</h2>

<div class="grid">
  <!-- Titular 1 -->
  <div>
    <label>Número de titulares</label>
    <select id="perfilTitulares">
      <option value="1">1 titular</option>
      <option value="2">2 titulares</option>
    </select>
  </div>
  <div>
    <label>Edad titular 1</label>
    <input id="perfilEdad1" type="number" min="18" max="75" value="30">
  </div>
  <div>
    <label>Ingreso mensual titular 1 (€)</label>
    <input id="perfilSalario1" type="number" value="2000">
  </div>
  <div>
    <label>Número de pagas</label>
    <input id="perfilPagas" type="number" value="12">
  </div>
  <div>
    <label>Deuda mensual (€)</label>
    <input id="perfilDeuda" type="number" value="0">
  </div>
  <div>
    <label>Otro ingreso mensual (€)</label>
    <input id="perfilOtroIngreso" type="number" value="0">
  </div>

  <!-- Titular 2 -->
  <div id="perfilTitular2Div" style="display:none;">
    <label>Edad titular 2</label>
    <input id="perfilEdad2" type="number" min="18" max="75" value="28">
    <label>Ingreso mensual titular 2 (€)</label>
    <input id="perfilSalario2" type="number" value="1500">
  </div>

  <!-- Vivienda -->
  <div>
    <label>¿Ya tiene vivienda?</label>
    <input type="checkbox" id="yaTieneVivienda">
  </div>
</div>

<div id="viviendaInfo" style="display:none;">
<div class="grid">
  <div>
    <label>Precio vivienda (€)</label>
    <input id="perfilPrecio" type="number" value="200000">
  </div>
  <div>
    <label>Tipo de vivienda</label>
    <select id="perfilTipoVivienda">
      <option value="primera">Primera vivienda</option>
      <option value="segunda">Segunda residencia</option>
      <option value="local">Local comercial</option>
    </select>
  </div>
  <div>
    <label>Plazo máximo (años)</label>
    <input id="perfilPlazo" type="number" value="30">
  </div>
</div>
<p id="perfilAviso" style="color:#0d4f8b;"></p>
</div>

<div class="cards">
  <div class="card"><p>Importe préstamo posible</p><h3 id="perfilCapital"></h3></div>
  <div class="card"><p>Cuota mensual estimada</p><h3 id="perfilCuota"></h3></div>
  <div class="card"><p>Compatibilidad</p><h3 id="perfilCompatible"></h3></div>
</div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
