<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Hipotecario</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Simulador Hipotecario</h1>

  <!-- Botones de sección -->
  <div class="grid">
    <button id="btnCalculadora">Calculadora</button>
    <button id="btnPerfil">Analizar Perfil</button>
  </div>

  <!-- --- CALCULADORA --- -->
  <div id="calculadora" style="display:none;">
    <h2>Calculadora de Hipoteca</h2>
    <div class="grid-form">
      <label>Importe préstamo (€)</label>
      <input type="number" id="prestamo" placeholder="Ej: 100000">
      <label>Interés anual (%)</label>
      <input type="number" id="interes" placeholder="Ej: 4.15">
      <label>Plazo (años)</label>
      <input type="number" id="anos" placeholder="Ej: 20">
    </div>

    <div id="resultados" class="cards" style="display:none;">
      <div class="card">
        <strong>Cuota mensual:</strong> <span id="cuota">-</span>
      </div>
      <div class="card">
        <strong>Intereses totales:</strong> <span id="interesesTotales">-</span>
      </div>
      <div class="card">
        <strong>Total pagado:</strong> <span id="totalPagado">-</span>
      </div>
    </div>

    <button id="verTabla" style="display:none;">Ver tabla de amortización</button>
    <div id="tablaContainer" style="display:none;">
      <table id="tabla">
        <thead>
          <tr><th>Mes</th><th>Cuota</th><th>Interés</th><th>Capital</th><th>Saldo</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- --- PERFIL --- -->
  <div id="perfil" style="display:none;">
    <h2>Analizar Perfil</h2>

    <div class="grid-form">
      <label>Número de titulares</label>
      <select id="perfilTitulares">
        <option value="1">1</option>
        <option value="2">2</option>
      </select>

      <label>Edad titular 1</label>
      <input type="number" id="perfilEdad1" placeholder="Ej: 35">
      <label>Salario anual titular 1 (€)</label>
      <input type="number" id="perfilSalario1" placeholder="Ej: 30000">

      <div id="titular2Div" style="display:none;">
        <label>Edad titular 2</label>
        <input type="number" id="perfilEdad2" placeholder="Ej: 32">
        <label>Salario anual titular 2 (€)</label>
        <input type="number" id="perfilSalario2" placeholder="Ej: 25000">
      </div>

      <label>Pagas al año</label>
      <input type="number" id="perfilPagas" placeholder="12">
      <label>Otros ingresos anuales (€)</label>
      <input type="number" id="perfilOtroIngreso" placeholder="Ej: 5000">
      <label>Deudas mensuales (€)</label>
      <input type="number" id="perfilDeuda" placeholder="Ej: 200">
      <label>Ahorros disponibles (€)</label>
      <input type="number" id="perfilAhorros" placeholder="Ej: 10000">
    </div>

    <h3>Resultado del análisis</h3>
    <div class="cards">
      <div class="card">
        <strong>Capital posible (€)</strong>: <span id="perfilCapital">-</span>
      </div>
      <div class="card">
        <strong>Cuota máxima (€)</strong>: <span id="perfilCuota">-</span>
      </div>
      <div class="card">
        <strong>LTV</strong>: <span id="perfilLTV">-</span>
      </div>
      <div class="card">
        <strong>LTI</strong>: <span id="perfilLTI">-</span>
      </div>
      <div class="card">
        <strong>Compatibilidad</strong>: <span id="perfilCompatible">-</span>
      </div>
    </div>

    <div id="perfilVivienda" style="margin-top:20px;">
      <h3>Detalle vivienda</h3>
      <div class="grid-form">
        <label>Ya tiene vivienda</label>
        <select id="perfilViviendaExtra">
          <option value="no">No</option>
          <option value="si">Sí</option>
        </select>

        <label>Precio vivienda (€)</label>
        <input type="number" id="perfilPrecio" placeholder="Ej: 100000">

        <label>Tipo de vivienda</label>
        <select id="perfilTipoVivienda">
          <option value="primera">Primera vivienda</option>
          <option value="segunda">Segunda residencia</option>
          <option value="local">Local</option>
        </select>

        <label>Obra nueva / Segunda mano</label>
        <select id="perfilComunidad">
          <option value="obraNueva">Obra nueva</option>
          <option value="segunda">Segunda mano</option>
        </select>

        <label>Plazo años</label>
        <input type="number" id="perfilPlazo" placeholder="Ej: 30">
      </div>
      <p id="perfilMensaje" style="color:red;font-weight:bold;margin-top:10px;"></p>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
