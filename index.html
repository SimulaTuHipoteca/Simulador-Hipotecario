<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simula tu Hipoteca</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h1>Simula tu Hipoteca</h1>

<!-- BOTONES INICIO -->
<div class="selector">
  <button id="btnCalculadora">Calculadora de Hipoteca</button>
  <button id="btnPerfil">Analizar Perfil</button>
</div>

<!-- MENSAJE EURIBOR -->
<p style="color:#0d4f8b; font-weight:bold; margin-bottom:20px;">
Euribor actual (referencia hipotecas): <span id="euriborValor">4,15%</span>
</p>

<!-- CALCULADORA -->
<div id="calculadora" class="seccion" style="display:none;">
<h2>Calculadora de Hipoteca</h2>

<div class="grid">
  <div>
    <label>Importe del préstamo (€)</label>
    <input id="prestamo" type="number" placeholder="Ej: 150000">
  </div>
  <div>
    <label>Tipo de interés anual (%)</label>
    <input id="interes" type="number" step="0.01" placeholder="Ej: 3">
  </div>
  <div>
    <label>Plazo (años)</label>
    <input id="anos" type="number" placeholder="Ej: 30">
  </div>
</div>

<div class="cards" id="resultados" style="display:none;">
  <div class="card">
    <p>Cuota mensual</p>
    <h3 id="cuota"></h3>
  </div>
  <div class="card">
    <p>Intereses totales</p>
    <h3 id="interesesTotales"></h3>
  </div>
  <div class="card">
    <p>Total pagado</p>
    <h3 id="totalPagado"></h3>
  </div>
</div>

<button id="verTabla" style="display:none;">
Ver cuadro de amortización
</button>

<div id="tablaContainer" style="display:none;">
<h2>Tabla de amortización</h2>
<table id="tabla">
<thead>
<tr>
<th>Mes</th>
<th>Cuota</th>
<th>Interés</th>
<th>Capital</th>
<th>Restante</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<!-- SECCIÓN PERFIL -->
<div id="perfil" class="seccion" style="display:none;">
<h2>Analizar Perfil Financiero</h2>

<div class="grid">
  <div>
    <label>Número de titulares</label>
    <select id="perfilTitulares">
      <option value="1">1 titular</option>
      <option value="2">2 titulares</option>
    </select>
  </div>
  <div>
    <label>Edad titular 1</label>
    <input id="perfilEdad1" type="number" min="18" max="75" placeholder="Ej: 35">
  </div>
  <div id="perfilEdad2Div" style="display:none">
    <label>Edad titular 2</label>
    <input id="perfilEdad2" type="number" min="18" max="75" placeholder="Ej: 33">
  </div>
  <div>
    <label>Ingreso mensual titular 1 (€)</label>
    <input id="perfilSalario1" type="number" placeholder="Ej: 2500">
  </div>
  <div id="perfilSalario2Div" style="display:none">
    <label>Ingreso mensual titular 2 (€)</label>
    <input id="perfilSalario2" type="number" placeholder="Ej: 2000">
  </div>
  <div>
    <label>Número de pagas al año</label>
    <input id="perfilPagas" type="number" value="12">
  </div>
  <div>
    <label>Deuda / pagos mensuales (€)</label>
    <input id="perfilDeuda" type="number" placeholder="Ej: 350">
  </div>
  <div>
    <label>Otro ingreso mensual opcional (€)</label>
    <input id="perfilOtroIngreso" type="number" placeholder="Opcional">
  </div>
  <div>
    <label>Tipo vivienda</label>
    <select id="perfilTipoVivienda">
      <option value="primera">Primera vivienda</option>
      <option value="segunda">Segunda residencia</option>
      <option value="local">Local comercial</option>
    </select>
  </div>
  <div>
    <label>Tipo interés (%)</label>
    <input id="perfilInteres" type="number" value="2.8">
  </div>
  <div>
    <label>Plazo años</label>
    <input id="perfilPlazo" type="number" value="30">
  </div>
</div>

<div id="perfilAviso" style="margin-top:10px; color:#b45309; font-weight:bold;"></div>

<div class="cards">
  <div class="card"><p>Importe de préstamo</p><h3 id="perfilCapital"></h3></div>
  <div class="card"><p>Cuota mensual</p><h3 id="perfilCuota"></h3></div>
  <div class="card"><p>Compatibilidad</p><h3 id="perfilCompatible"></h3></div>
</div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
