<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Simula tu Hipoteca</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Simula tu Hipoteca</h1>

<div class="selector">

<button id="btnCalculadora">
Calculadora de Hipoteca
</button>

<button id="btnPerfil">
Analizar Perfil
</button>

</div>


<!-- ======================= -->
<!-- CALCULADORA HIPOTECA -->
<!-- ======================= -->

<div id="calculadora" style="display:none;">

<h2>Calculadora</h2>

<div class="grid">

<div>
<label>Importe del préstamo (€)</label>
<input id="prestamo" type="number" placeholder="Ej: 150000">
</div>

<div>
<label>Tipo de interés anual (%)</label>
<input id="interes" type="number" placeholder="Ej: 3">
</div>

<div>
<label>Plazo (años)</label>
<input id="anos" type="number" placeholder="Ej: 30">
</div>

</div>

<button onclick="calcular()">Calcular</button>

<div id="resultados" class="cards" style="display:none;">

<div class="card">
<p>Cuota mensual</p>
<h3 id="cuota"></h3>
</div>

<div class="card">
<p>Intereses totales</p>
<h3 id="interesesTotales"></h3>
</div>

<div class="card">
<p>Total pagado</p>
<h3 id="totalPagado"></h3>
</div>

</div>


<button id="verTabla" style="display:none;">
Ver cuadro de amortización
</button>

<div id="tablaContainer" style="display:none;">

<h3>Tabla de amortización</h3>

<table id="tabla">

<thead>
<tr>

<th>Mes</th>
<th>Cuota</th>
<th>Interés</th>
<th>Capital</th>
<th>Restante</th>

</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>


<!-- ======================= -->
<!-- ANALISIS PERFIL -->
<!-- ======================= -->

<div id="perfil" style="display:none;">

<h2>Análisis de perfil financiero</h2>


<div class="grid">

<div>
<label>Número de titulares</label>

<select id="perfilTitulares">

<option value="1">1 titular</option>
<option value="2">2 titulares</option>

</select>

</div>

</div>


<!-- TITULAR 1 -->

<div class="grid">

<div>

<label>Edad titular 1</label>
<input id="perfilEdad1" type="number" placeholder="Ej: 35">

</div>

<div>

<label>Ingreso mensual titular 1 (€)</label>
<input id="perfilSalario1" type="number" placeholder="Ej: 2500">

</div>

</div>


<!-- TITULAR 2 -->

<div id="titular2Div" style="display:none;">

<div class="grid">

<div>

<label>Edad titular 2</label>
<input id="perfilEdad2" type="number" placeholder="Ej: 33">

</div>

<div>

<label>Ingreso mensual titular 2 (€)</label>
<input id="perfilSalario2" type="number" placeholder="Ej: 2000">

</div>

</div>

</div>


<div class="grid">

<div>
<label>Pagas al año</label>
<input id="perfilPagas" type="number" value="12">
</div>

<div>
<label>Deudas mensuales (€)</label>
<input id="perfilDeuda" type="number" placeholder="Ej: 300">
</div>

<div>
<label>Otros ingresos mensuales</label>
<input id="perfilOtroIngreso" type="number" placeholder="Opcional">
</div>

<div>
<label>Ahorros disponibles</label>
<input id="perfilAhorros" type="number" placeholder="Ej: 40000">
</div>

</div>


<!-- RESULTADOS PERFIL -->

<div class="cards">

<div class="card">
<p>Capital máximo estimado</p>
<h3 id="perfilCapital"></h3>
</div>

<div class="card">
<p>Cuota estimada</p>
<h3 id="perfilCuota"></h3>
</div>

<div class="card">
<p>LTI</p>
<h3 id="perfilLTI"></h3>
</div>

<div class="card">
<p>Compatibilidad</p>
<h3 id="perfilCompatible"></h3>
</div>

</div>


<hr>


<!-- VIVIENDA -->

<div>

<label>
<input type="checkbox" id="yaTieneVivienda">
Ya tengo una vivienda vista
</label>

</div>


<div id="viviendaInfo" style="display:none;">


<h3>Datos de la vivienda</h3>


<div class="grid">

<div>

<label>Precio vivienda</label>
<input id="perfilPrecio" type="number" placeholder="Ej: 200000">

</div>


<div>

<label>Tipo de operación</label>

<select id="perfilTipoVivienda">

<option value="primera">Primera vivienda</option>
<option value="segunda">Segunda vivienda</option>
<option value="local">Local comercial</option>

</select>

</div>


<div>

<label>Tipo de compra</label>

<select id="perfilTipoOperacion">

<option value="segundaMano">Segunda mano</option>
<option value="obraNueva">Obra nueva</option>

</select>

</div>


<div>

<label>Comunidad autónoma</label>

<select id="perfilComunidad">

<option value="0.06">Madrid (6%)</option>
<option value="0.10">Cataluña (10%)</option>
<option value="0.10">Andalucía (10%)</option>
<option value="0.08">Valencia (8%)</option>
<option value="0.08">Galicia (8%)</option>
<option value="0.08">Castilla y León (8%)</option>

</select>

</div>


<div>

<label>Plazo hipoteca (años)</label>
<input id="perfilPlazo" type="number" placeholder="Ej: 30">

</div>

</div>


<div class="cards">

<div class="card">
<p>% financiación</p>
<h3 id="perfilLTV"></h3>
</div>

<div class="card">
<p>Gastos estimados</p>
<h3 id="perfilGastos"></h3>
</div>

</div>


<p id="perfilMensaje"></p>


</div>

</div>


</div>


<script src="script.js"></script>

</body>
</html>
