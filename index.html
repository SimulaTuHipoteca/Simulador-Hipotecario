<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simula tu Hipoteca</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Simula tu Hipoteca</h1>

<div class="selector">
<button id="btnCalculadora">Calculadora de Hipoteca</button>
<button id="btnPerfil">Analizar Perfil</button>
</div>

<p class="euribor">
Euríbor actual: <span id="euriborValor">cargando...</span>
</p>

<!-- CALCULADORA -->
<div id="calculadora" class="seccion">

<h2>Calculadora de Hipoteca</h2>

<div class="grid">

<div>
<label>Importe del préstamo (€)</label>
<input id="prestamo" type="number" value="200000">
</div>

<div>
<label>Tipo de interés (%)</label>
<input id="interes" type="number" step="0.1" value="3">
</div>

<div>
<label>Años</label>
<input id="anos" type="number" value="30">
</div>

</div>

<div class="cards" id="resultados">

<div class="card">
<p>Cuota mensual</p>
<h3 id="cuota"></h3>
</div>

<div class="card">
<p>Intereses totales</p>
<h3 id="interesesTotales"></h3>
</div>

<div class="card">
<p>Total pagado</p>
<h3 id="totalPagado"></h3>
</div>

</div>

<button id="verTabla">Ver tabla de amortización</button>

<div id="tablaContainer">

<table id="tabla">

<thead>
<tr>
<th>Mes</th>
<th>Cuota</th>
<th>Interés</th>
<th>Capital</th>
<th>Restante</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<!-- ANALIZAR PERFIL -->

<div id="perfil" class="seccion" style="display:none">

<h2>Analizar Perfil</h2>

<div class="grid">

<div>
<label>Número de titulares</label>
<select id="perfilTitulares">
<option value="1">1</option>
<option value="2">2</option>
</select>
</div>

<div>
<label>Ingreso mensual titular 1</label>
<input id="perfilSalario1" type="number">
</div>

<div>
<label>Número pagas</label>
<input id="perfilPagas" type="number" value="12">
</div>

<div>
<label>Edad</label>
<input id="perfilEdad1" type="number">
</div>

<div>
<label>Deuda mensual</label>
<input id="perfilDeuda" type="number">
</div>

<div>
<label>Otro ingreso</label>
<input id="perfilOtroIngreso" type="number">
</div>

<div>
<label>Tipo vivienda</label>
<select id="perfilTipo">
<option value="primera">Primera vivienda</option>
<option value="segunda">Segunda residencia</option>
<option value="local">Local comercial</option>
</select>
</div>

<div>
<label>Tipo interés (%)</label>
<input id="perfilInteres" type="number" value="2.8">
</div>

<div>
<label>Plazo años</label>
<input id="perfilPlazo" type="number" value="30">
</div>

</div>

<div class="cards">

<div class="card">
<p>Importe préstamo</p>
<h3 id="perfilCapital"></h3>
</div>

<div class="card">
<p>Cuota mensual</p>
<h3 id="perfilCuota"></h3>
</div>

<div class="card">
<p>Compatibilidad</p>
<h3 id="perfilCompatible"></h3>
<p id="perfilCompatibleMsg"></p>
</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
